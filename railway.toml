[build]
builder = "nixpacks"
buildCommand = "cd frontend && npm install && npm run build && cd ../backend && npm install && npm run build && mkdir -p dist/public && cp -r ../frontend/dist/. dist/public/"

[deploy]
startCommand = "cd backend && node dist/db/migrate.js; node dist/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
